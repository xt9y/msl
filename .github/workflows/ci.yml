# GitHub Actions macOS runners are themselves virtualized and lack nested
# virtualization support — Apple's VZVirtualMachine cannot boot a guest VM
# here.  All tests that require a running VM (exec, shell, stop, restart)
# are gated behind `msl check-virt` and skipped when unavailable.
# These tests pass on real Apple Silicon Mac hardware.

name: "Build & Integration Test"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache zig toolchain
        id: cache-zig
        uses: actions/cache@v4
        with:
          path: /tmp/zig-macos-aarch64-0.14.0
          key: zig-0.14.0

      - name: Download zig (if not cached)
        if: steps.cache-zig.outputs.cache-hit != 'true'
        run: |
          echo "Downloading zig 0.14.0 (45MB)..."
          curl -sL --connect-timeout 30 --max-time 300 \
            'https://ziglang.org/download/0.14.0/zig-macos-aarch64-0.14.0.tar.xz' \
            -o /tmp/zig.tar.xz
          tar xf /tmp/zig.tar.xz -C /tmp
          rm -f /tmp/zig.tar.xz
          /tmp/zig-macos-aarch64-0.14.0/zig version

      - name: Build guest daemon
        run: |
          mkdir -p build
          /tmp/zig-macos-aarch64-0.14.0/zig cc \
            -target aarch64-linux-musl -static -Os -s -o build/msld Guest/msld.c
          file build/msld

      - name: Build host binary
        run: make

      - name: Verify binary runs
        run: ./build/msl version

      - name: Validate Arch Linux ARM GPG signing key fingerprint
        run: |
          FINGERPRINT="68B3537F39A313B3E574D06777193F152BDBE6A6"
          if ! command -v gpg &>/dev/null; then
            echo "SKIP: gpg not available — fingerprint not verified against keyserver"
            exit 0
          fi
          GNUPGHOME=$(mktemp -d)
          export GNUPGHOME
          echo "Fetching Arch Linux ARM signing key from keyserver..."
          if gpg --keyserver keyserver.ubuntu.com --recv-keys "$FINGERPRINT" 2>&1; then
            echo "  -> key imported successfully"
          else
            echo "WARN: keyserver unreachable — skipping live verification"
            echo "      fingerprint: $FINGERPRINT"
            rm -rf "$GNUPGHOME"
            exit 0
          fi
          echo "Verifying fingerprint..."
          EXPECTED=$(echo "$FINGERPRINT" | tr '[:upper:]' '[:lower:]')
          ACTUAL=$(gpg --list-keys --with-colons --fingerprint "$FINGERPRINT" 2>/dev/null | grep '^fpr:' | head -1 | cut -d: -f10 | tr '[:upper:]' '[:lower:]')
          if [ "$ACTUAL" = "$EXPECTED" ]; then
            echo "PASS: fingerprint matches Arch Linux ARM Build System signing key"
          else
            echo "FAIL: fingerprint mismatch!"
            echo "  expected: $EXPECTED"
            echo "  actual:   $ACTUAL"
            rm -rf "$GNUPGHOME"
            exit 1
          fi
          if gpg --list-keys "$FINGERPRINT" 2>/dev/null | grep -qi "Arch Linux ARM"; then
            echo "PASS: key UID confirms Arch Linux ARM origin"
          else
            echo "WARN: key UID does not mention Arch Linux ARM"
          fi
          rm -rf "$GNUPGHOME"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: msl-build
          path: |
            build/msl
            build/msld
          retention-days: 1

  integration:
    needs: build
    runs-on: macos-14
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: msl-build
          path: build

      - name: Make binaries executable
        run: chmod +x build/msl build/msld

      - name: Install e2fsprogs
        run: brew install e2fsprogs

      - name: Check virtualization support
        id: check-virt
        run: |
          if ./build/msl check-virt; then
            echo "virt=yes" >> "$GITHUB_OUTPUT"
            echo "VIRT=yes" >> "$GITHUB_ENV"
          else
            echo "virt=no" >> "$GITHUB_OUTPUT"
            echo "VIRT=no" >> "$GITHUB_ENV"
          fi

      - name: Run setup
        run: |
          echo "--- Setup ---"
          ./build/msl setup --disk-size 6 --ram-size 2 --cpu-cores 2
        timeout-minutes: 30

      - name: VM tests (skipped on GitHub Actions)
        if: env.VIRT == 'no'
        run: |
          echo "──────────────────────────────────────────────────"
          echo "  Virtualization: not supported on this runner"
          echo "  VM boot/exec/shell/stop/restart tests skipped."
          echo "  These require real Apple Silicon Mac hardware."
          echo "──────────────────────────────────────────────────"

      - name: "Boot VM"
        if: env.VIRT == 'yes'
        run: |
          echo "--- Starting VM ---"
          ./build/msl start
        timeout-minutes: 5

      - name: "Test exec: basic command"
        if: env.VIRT == 'yes'
        run: |
          result=$(./build/msl exec "uname -a" 2>&1)
          echo "$result"
          echo "$result" | grep -q Linux || { echo "FAIL: uname -a did not contain Linux"; exit 1; }
          echo "PASS: uname -a"

      - name: "Test exec: shell pipe"
        if: env.VIRT == 'yes'
        run: |
          result=$(./build/msl exec "echo hello | cat" 2>&1)
          echo "$result"
          echo "$result" | grep -q hello || { echo "FAIL: pipe"; exit 1; }
          echo "PASS: shell pipe"

      - name: "Test exec: system booted"
        if: env.VIRT == 'yes'
        run: |
          result=$(./build/msl exec "cat /proc/1/comm" 2>&1)
          echo "$result"
          echo "$result" | grep -q systemd || { echo "FAIL: systemd not running"; exit 1; }
          echo "PASS: system booted"

      - name: "Test exec: package manager"
        if: env.VIRT == 'yes'
        run: |
          result=$(./build/msl exec "pacman -Qi base 2>&1 | head -3" 2>&1)
          echo "$result"
          echo "$result" | grep -qi "name.*base" || { echo "FAIL: pacman"; exit 1; }
          echo "PASS: pacman"

      - name: "Test exec: exit code propagation"
        if: env.VIRT == 'yes'
        run: |
          ./build/msl exec "exit 42" 2>&1
          rc=$?
          [ $rc -eq 42 ] || { echo "FAIL: expected exit 42, got $rc"; exit 1; }
          echo "PASS: exit code 42"

      - name: "Test shell (non-interactive)"
        if: env.VIRT == 'yes'
        run: |
          result=$(echo "echo hello_shell; exit" | ./build/msl shell 2>&1)
          echo "$result"
          echo "$result" | grep -q hello_shell || { echo "FAIL: shell"; exit 1; }
          echo "PASS: shell (non-interactive)"

      - name: "Test status"
        if: env.VIRT == 'yes'
        run: |
          status=$(./build/msl status 2>&1)
          echo "$status"
          echo "$status" | grep -qi "running" || { echo "FAIL: expected running"; exit 1; }
          echo "PASS: status"

      - name: "Test exec after boot stress"
        if: env.VIRT == 'yes'
        run: |
          for i in 1 2 3 4 5; do
            result=$(./build/msl exec "echo concurrent_test_$i" 2>&1)
            echo "$result" | grep -q "concurrent_test_$i" || { echo "FAIL: concurrent test $i"; exit 1; }
          done
          echo "PASS: concurrent exec"

      - name: "Stop VM"
        if: env.VIRT == 'yes'
        run: |
          ./build/msl stop
          sleep 2
          status=$(./build/msl status 2>&1)
          echo "$status"
          echo "$status" | grep -qi "stopped" || { echo "FAIL: expected stopped"; exit 1; }
          echo "PASS: stop"

      - name: "Restart and verify clean state"
        if: env.VIRT == 'yes'
        run: |
          ./build/msl start
          sleep 5
          result=$(./build/msl exec "echo after_restart" 2>&1)
          echo "$result"
          echo "$result" | grep -q after_restart || { echo "FAIL: restart"; exit 1; }
          ./build/msl stop
          echo "PASS: restart"

      - name: "Test pacman-keyring init marker"
        if: env.VIRT == 'yes'
        run: |
          echo "Checking pacman-keyring init completed..."
          if [ -f ~/.msl/.pacman-key.done ]; then
            echo "PASS: host marker ~/.msl/.pacman-key.done exists"
          else
            echo "FAIL: pacman-keyring host marker not created"
            exit 1
          fi
          guest_marker=$(./build/msl exec "test -f /var/lib/msl-pacman-key.done && echo yes || echo no" 2>&1)
          if [ "$guest_marker" = "yes" ]; then
            echo "PASS: guest marker /var/lib/msl-pacman-key.done exists"
          else
            echo "FAIL: guest marker not found in VM"
            exit 1
          fi

      - name: "Test firewall and installed packages"
        if: env.VIRT == 'yes'
        run: |
          echo "Checking msl-firewall service..."
          firewall_status=$(./build/msl exec "systemctl is-active msl-firewall" 2>&1)
          echo "msl-firewall: $firewall_status"
          if [ "$firewall_status" = "active" ]; then
            echo "PASS: msl-firewall service is active"
          else
            echo "FAIL: msl-firewall not active (got: $firewall_status)"
            exit 1
          fi

          echo "Checking iptables rules..."
          iptables_rules=$(./build/msl exec "iptables -L INPUT -n" 2>&1)
          echo "$iptables_rules"
          if echo "$iptables_rules" | grep -q "DROP"; then
            echo "PASS: iptables DROP rule present"
          else
            echo "FAIL: no DROP rule in INPUT chain"
            exit 1
          fi

          echo "Checking installed packages..."
          for pkg in iptables-nft ncurses archlinuxarm-keyring; do
            pkg_info=$(./build/msl exec "pacman -Qi $pkg 2>&1 | head -1" 2>&1)
            echo "$pkg: $pkg_info"
            if echo "$pkg_info" | grep -qi "Name"; then
              echo "  PASS: $pkg installed"
            else
              echo "  FAIL: $pkg not installed"
              exit 1
            fi
          done
